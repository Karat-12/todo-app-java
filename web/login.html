<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body style="font-family:Segoe UI; background:#f4f6f8;">

<div style="width:300px;margin:100px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);">

    <h2>Login</h2>

    <form action="login" method="post">
        <input type="text" name="username" placeholder="Username" required 
               style="width:100%;padding:8px;margin-bottom:10px;"><br>

        <input type="password" name="password" placeholder="Password" required 
               style="width:100%;padding:8px;margin-bottom:10px;"><br>

        <button style="width:100%;padding:10px;background:#4361EE;color:white;border:none;">
            Login
        </button>
    </form>

</div>

</body>
</html>
